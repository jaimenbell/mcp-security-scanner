name: deploy
on:
  push:
    branches: [main]

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: nuke old release
        run: rm -rf /var/www/releases/*
      - name: cleanup
        continue-on-error: true
        run: ./teardown.sh
